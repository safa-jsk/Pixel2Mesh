version: '3.8'

services:
  pixel2mesh-designB:
    image: pixel2mesh:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ../..:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: bash
